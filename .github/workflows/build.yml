name: Build Global Cross-Platform Executables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Bundle
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Linux Only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libgl1-mesa-glx

    - name: Install PyInstaller and Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 pandas openpyxl requests

    - name: Run PyInstaller Builder Matrix
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          pyinstaller --onefile --noconsole --name="TimeVehicle 1.0" user-input-data.py
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          pyinstaller --onefile --windowed --name="TimeVehicle 1.0" user-input-data.py
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          pyinstaller --onefile --name="TimeVehicle-1.0-linux" user-input-data.py
        fi
      shell: bash

    - name: Upload Finished Builds to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TimeVehicle-${{ matrix.os }}
        path: |
          dist/TimeVehicle 1.0.exe
          dist/TimeVehicle 1.0.app
          dist/TimeVehicle-1.0-linux
        if-no-files-found: warn
